<!DOCTYPE html>

<h1>The JavaScript <i>this</i> Keyword</h1>

<p>When used alone, <b>this</b> refers to the global object.</p>
<p>In this example, the global object is the <b>window object</b>.</p>

<p>In NODE.js it is a GLOBAL object just see </b>.</p>

<p id="demo"></p>

<script> 
let x = this;

document.getElementById("demo").innerHTML = "This is: " + x;
</script>

</body>
</html>
