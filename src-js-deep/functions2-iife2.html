<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Functions</h1>
<h3>IIFEs (Immediately Invoked Function Expressions)</h3>
<p>Functions can be invoked automatically without being called:</p>

<p id="demo"></p>

<script>
(function (name) {
  let text = "Hello " + name;
  document.getElementById("demo").innerHTML = text; 
})("John Doe");
</script>

</body>
</html>
